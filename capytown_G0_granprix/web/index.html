<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CapyTown - Visualizador Web</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111318;
      --panel: #191d24;
      --panel-2: #202633;
      --line: #333b49;
      --muted: #9aa6b2;
      --text: #edf2f7;
      --cyan: #26c6da;
      --green: #45c46a;
      --red: #ef5350;
      --yellow: #ffd54f;
      --orange: #ff9f43;
      --blue: #4f83ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-rows: auto auto 1fr;
      height: 100%;
      min-width: 320px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto auto auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      background: #151922;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.1;
      font-weight: 750;
      white-space: nowrap;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 120px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--orange);
      box-shadow: 0 0 0 3px rgba(255, 159, 67, 0.12);
      flex: 0 0 auto;
    }

    .dot.ok {
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(69, 196, 106, 0.14);
    }

    .dot.bad {
      background: var(--red);
      box-shadow: 0 0 0 3px rgba(239, 83, 80, 0.13);
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      min-width: 0;
    }

    input,
    button,
    select {
      height: 34px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      outline: none;
    }

    input {
      width: min(380px, 34vw);
      min-width: 190px;
      padding: 0 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    button,
    select {
      padding: 0 11px;
      cursor: pointer;
    }

    button:hover,
    select:hover,
    input:focus {
      border-color: var(--cyan);
    }

    button.primary {
      background: #1f5260;
      border-color: #287184;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 1px;
      background: var(--line);
      border-bottom: 1px solid var(--line);
    }

    .metric {
      min-width: 0;
      padding: 8px 12px;
      background: var(--panel);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 3px;
      overflow: hidden;
      color: var(--text);
      font-size: 15px;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stage {
      position: relative;
      min-height: 0;
      background: #0f1217;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .toast {
      position: absolute;
      right: 12px;
      bottom: 12px;
      max-width: min(520px, calc(100% - 24px));
      padding: 9px 11px;
      border: 1px solid rgba(239, 83, 80, 0.45);
      border-radius: 6px;
      background: rgba(25, 29, 36, 0.94);
      color: #ffcdd2;
      font-size: 13px;
      line-height: 1.35;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 820px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .brand,
      .controls {
        width: 100%;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr auto auto;
      }

      input {
        width: 100%;
        min-width: 0;
      }

      .metrics {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .metric {
        padding: 7px 10px;
      }

      h1 {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1>CapyTown Visualizador</h1>
        <div class="status" title="Estado de conexion">
          <span id="dot" class="dot"></span>
          <span id="statusText">Sin datos</span>
        </div>
      </div>
      <div class="controls">
        <input id="endpoint" spellcheck="false" value="http://10.42.0.1:8080/data" aria-label="URL de datos">
        <button id="connect" class="primary" type="button">Conectar</button>
        <button id="pause" type="button">Pausar</button>
      </div>
      <select id="rate" aria-label="Refresco">
        <option value="16" selected>60 Hz</option>
        <option value="22">45 Hz</option>
        <option value="33">30 Hz</option>
        <option value="50">20 Hz</option>
        <option value="67">15 Hz</option>
        <option value="100">10 Hz</option>
        <option value="200">5 Hz</option>
        <option value="500">2 Hz</option>
      </select>
      <button id="fit" type="button">Centrar</button>
    </header>

    <section class="metrics" aria-label="Metricas">
      <div class="metric"><span>FSM</span><strong id="mEstado">INICIO</strong></div>
      <div class="metric"><span>Movimiento actual</span><strong id="mMovimiento">DETENIDO</strong></div>
      <div class="metric"><span>Tramo</span><strong id="mTramo">0</strong></div>
      <div class="metric"><span>Odom</span><strong id="mOdom">0.0 cm</strong></div>
      <div class="metric"><span>LiDAR</span><strong id="mLidar">0 pts</strong></div>
      <div class="metric"><span>Frente / Izq / Der / Atrás</span><strong id="mDist">-- / -- / -- / --</strong></div>
      <div class="metric"><span>Pared izquierda: recta / puntual</span><strong id="mLadoDos">-- / --</strong></div>
      <div class="metric"><span>Comando lineal / angular</span><strong id="mCmd">0.00 / 0.00</strong></div>
      <div class="metric"><span>PARE</span><strong id="mPare">0</strong></div>
      <div class="metric"><span>VERDE</span><strong id="mVerde">NO</strong></div>
      <div class="metric"><span>Ruta corta</span><strong id="mRuta">--</strong></div>
      <div class="metric"><span>Cámara</span><strong id="mCamera">sin imagen</strong></div>
    </section>

    <section class="stage">
      <canvas id="view"></canvas>
      <div id="toast" class="toast"></div>
    </section>
  </main>

  <script>
    "use strict";

    const PISTA_COLS = 12;
    const PISTA_ROWS = 8;
    // Ruta de exploracion (Intento 1, pared izquierda): hardcodeada porque el
    // laberinto es fijo (misma PISTA_PAREDES de abajo) -- se deriva una sola
    // vez simulando el seguidor de pared izquierda sobre esas paredes, no se
    // recalcula con odometria en vivo (esa integracion continua es la que
    // dibujaba el recorrido curvo/con deriva). logica_dos_reglas no se
    // detiene en la meta (el verde solo marca la celda, no cambia de
    // estado): sigue la pared izquierda hasta cerrar la vuelta completa del
    // laberinto, de regreso a INICIO. Cada vertice es un punto de giro real
    // del recorrido; se revela vertice a vertice con `giros_fisicos`
    // (contador de giros de 90 reales, publicado por maze_solver via
    // /maze/metricas) -- solo se escucha esa señal, no se recalcula la
    // forma del camino.
    const RUTA_EXPLORACION = [
      [0, 6], [0, 0], [3, 0], [3, 1], [1, 1], [1, 2], [4, 2], [4, 0],
      [11, 0], [11, 5], [8, 5], [8, 3], [6, 3], [6, 1], [5, 1], [5, 3],
      [3, 3], [3, 4], [7, 4], [7, 6], [11, 6], [11, 7], [6, 7], [6, 5],
      [5, 5], [5, 7], [0, 7], [0, 6]
    ];

    // Expande vertices a celdas y, de paso, guarda en que indice de esa
    // lista termina cada vertice -- NO se busca despues con findIndex
    // porque la ruta cierra en un lazo y repite celdas (A7 es la primera
    // Y la ultima), asi que buscar por coincidencia encontraria siempre
    // la primera aparicion en vez de la real.
    function expandirRutaCeldas(waypoints) {
      const celdas = [waypoints[0]];
      const finPorVertice = [0];
      for (let i = 1; i < waypoints.length; i++) {
        let [c, r] = celdas[celdas.length - 1];
        const [tc, tr] = waypoints[i];
        while (c !== tc || r !== tr) {
          c += Math.sign(tc - c);
          r += Math.sign(tr - r);
          celdas.push([c, r]);
        }
        finPorVertice.push(celdas.length - 1);
      }
      return { celdas, finPorVertice };
    }
    const { celdas: RUTA_EXPLORACION_CELDAS, finPorVertice: RUTA_EXPLORACION_TRAMO_FIN } =
      expandirRutaCeldas(RUTA_EXPLORACION);

    // Celda de la ruta fija mas cercana a un punto en vivo (para el cartel
    // PARE: no hay una señal de "en que tramo paso" por cada evento viejo,
    // asi que se ancla al punto de la ruta mas cercano en vez de al punto
    // de odometria crudo, que puede quedar fuera de la linea).
    function celdaMasCercanaEnRuta(px, py) {
      let mejor = RUTA_EXPLORACION_CELDAS[0];
      let mejorD2 = Infinity;
      for (const [c, r] of RUTA_EXPLORACION_CELDAS) {
        const dx = c + 0.5 - px;
        const dy = r + 0.5 - py;
        const d2 = dx * dx + dy * dy;
        if (d2 < mejorD2) {
          mejorD2 = d2;
          mejor = [c + 0.5, r + 0.5];
        }
      }
      return mejor;
    }

    const CAMINO_RAPIDO = [
      [0, 4], [0, 5], [0, 6], [0, 7],
      [1, 3], [2, 3], [3, 3], [4, 3],
      [4, 1], [4, 2],
      [5, 1], [6, 1], [7, 1], [8, 1],
      [9, 1], [10, 1], [11, 1]
    ];
    const PISTA_PAREDES = [
      [4, 0, 4, 2],
      [2, 2, 4, 2],
      [6, 2, 6, 4],
      [8, 2, 10, 2],
      [4, 4, 8, 4],
      [10, 2, 10, 4],
      [2, 4, 2, 6],
      [8, 4, 8, 6],
      [9, 5, 10, 5],
      [8, 6, 12, 6],
      [4, 6, 4, 7],
      [6, 6, 6, 8]
    ];
    const PISTA_BORDES = [
      [0, 0, 12, 0],
      [0, 0, 0, 8],
      [0, 8, 12, 8],
      [12, 0, 12, 8]
    ];

    const $ = (id) => document.getElementById(id);
    const canvas = $("view");
    const ctx = canvas.getContext("2d", { alpha: false });
    const endpointInput = $("endpoint");
    const statusText = $("statusText");
    const dot = $("dot");
    const toast = $("toast");

    let endpoint = localStorage.getItem("capytown.endpoint") || endpointInput.value;
    let data = null;
    let timer = null;
    let paused = false;
    let lastOkAt = 0;
    let lastError = "";
    let pollingBusy = false;
    let centerFollow = true;
    let lidarScale = 1.35;
    let lastCameraSrc = "";
    let cameraReady = false;
    let cameraLoading = false;
    let pendingCameraSrc = "";
    let cameraImg = new Image();

    endpointInput.value = endpoint;

    function fmt(v, suffix) {
      if (v === null || v === undefined || Number.isNaN(Number(v))) return "--";
      return `${Number(v).toFixed(2)}${suffix || ""}`;
    }

    function normalizeEndpoint(value) {
      let url = value.trim();
      if (!url) return "http://10.42.0.1:8080/data";
      if (!/^https?:\/\//i.test(url)) url = `http://${url}`;
      if (!/\/data(?:\?|$)/.test(url)) url = url.replace(/\/+$/, "") + "/data";
      return url;
    }

    function setStatus(kind, text) {
      dot.classList.toggle("ok", kind === "ok");
      dot.classList.toggle("bad", kind === "bad");
      statusText.textContent = text;
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.t);
      showToast.t = window.setTimeout(() => toast.classList.remove("show"), 3400);
    }

    async function poll() {
      if (paused) return;
      if (pollingBusy) return;
      pollingBusy = true;
      const controller = new AbortController();
      const timeout = window.setTimeout(() => controller.abort(), 900);

      try {
        const res = await fetch(endpoint, {
          signal: controller.signal,
          cache: "no-store",
          mode: "cors"
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
        lastOkAt = performance.now();
        lastError = "";
        setStatus("ok", "Conectado");
        updateMetrics();
        updateCameraFrame();
      } catch (err) {
        lastError = err && err.name === "AbortError" ? "Tiempo de espera agotado" : String(err.message || err);
        setStatus("bad", "Sin conexion");
      } finally {
        window.clearTimeout(timeout);
        pollingBusy = false;
      }
    }

    function updateMetrics() {
      const d = data || {};
      $("mEstado").textContent = d.estado || "INICIO";
      $("mMovimiento").textContent = d.movimiento || "DETENIDO";
      $("mTramo").textContent = d.tramo ?? 0;
      $("mOdom").textContent = `${Number(d.odom_cm || 0).toFixed(1)} cm`;
      $("mLidar").textContent = `${(d.lidar || []).length} pts`;
      $("mDist").textContent = `F ${fmt(d.d_frente, " m")} / I ${fmt(d.d_izq, " m")} / D ${fmt(d.d_der, " m")} / A ${fmt(d.d_atras, " m")}`;
      $("mLadoDos").textContent = `Recta ${fmt(d.d_lado_frontal, " m")} / Lado ${fmt(d.d_lado_trasera, " m")}`;
      $("mCmd").textContent = `v ${Number(d.v_cmd || 0).toFixed(3)} m/s / w ${Number(d.w_cmd || 0).toFixed(3)} rad/s`;
      $("mPare").textContent = `${(d.pare || []).length}`;
      const verde = Boolean(d.verde_detectado);
      $("mVerde").textContent = verde ? "SÍ" : "NO";
      $("mVerde").style.color = verde ? "#45c46a" : "#aeb8c4";
      const ruta = d.ruta_corta || [];
      $("mRuta").textContent = ruta.length > 1 ? `${ruta.length} celdas` : "--";
      $("mRuta").style.color = ruta.length > 1 ? "#ffd54f" : "#aeb8c4";
      const cam = d.camera || {};
      $("mCamera").textContent = cam.ok ? `${cam.w || 0}x${cam.h || 0}` : "sin imagen";
    }

    function updateCameraFrame() {
      const cam = (data && data.camera) || {};
      if (cam.src && cam.src !== lastCameraSrc) pendingCameraSrc = cam.src;
      if (!cameraLoading && pendingCameraSrc) {
        const src = pendingCameraSrc;
        pendingCameraSrc = "";
        cameraLoading = true;
        // Doble buffer: conservar el frame visible mientras carga el siguiente.
        // Cambiar cameraReady a false aquí causaba un destello negro por frame.
        const nextImage = new Image();
        nextImage.onload = () => {
          cameraImg = nextImage;
          cameraReady = true;
          cameraLoading = false;
          lastCameraSrc = src;
        };
        nextImage.onerror = () => {
          cameraLoading = false;
        };
        nextImage.src = src;
      }
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const w = Math.max(320, Math.floor(rect.width * dpr));
      const h = Math.max(260, Math.floor(rect.height * dpr));
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
      }
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function clear() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      ctx.fillStyle = "#0f1217";
      ctx.fillRect(0, 0, w, h);
    }

    function panelLayout() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const gap = 10;
      if (w >= 1180) {
        const cameraW = Math.max(300, Math.min(420, Math.floor(w * 0.30)));
        const lidarW = Math.max(300, Math.min(420, Math.floor(w * 0.30)));
        return [
          { x: 10, y: 10, w: cameraW, h: h - 20, name: "Cámara en vivo" },
          { x: 10 + cameraW + gap, y: 10, w: lidarW, h: h - 20, name: "LiDAR - Marco robot" },
          { x: 10 + cameraW + gap + lidarW + gap, y: 10, w: w - cameraW - lidarW - gap * 2 - 20, h: h - 20, name: "Pista - Recorrido" }
        ];
      }
      if (w >= 880) {
        const sideW = Math.max(320, Math.min(440, Math.floor(w * 0.38)));
        const topH = Math.max(210, Math.floor((h - 30) * 0.44));
        return [
          { x: 10, y: 10, w: sideW, h: topH, name: "Cámara en vivo" },
          { x: 10, y: 10 + topH + gap, w: sideW, h: h - topH - gap - 20, name: "LiDAR - Marco robot" },
          { x: 10 + sideW + gap, y: 10, w: w - sideW - gap - 20, h: h - 20, name: "Pista - Recorrido" }
        ];
      }
      const cameraH = Math.max(180, Math.floor(h * 0.28));
      const lidarH = Math.max(190, Math.floor(h * 0.30));
      return [
        { x: 10, y: 10, w: w - 20, h: cameraH, name: "Cámara en vivo" },
        { x: 10, y: 10 + cameraH + gap, w: w - 20, h: lidarH, name: "LiDAR - Marco robot" },
        { x: 10, y: 10 + cameraH + gap + lidarH + gap, w: w - 20, h: h - cameraH - lidarH - gap * 2 - 20, name: "Pista - Recorrido" }
      ];
    }

    function drawPanel(rect) {
      ctx.fillStyle = "#191d24";
      ctx.strokeStyle = "#333b49";
      ctx.lineWidth = 1;
      ctx.beginPath();
      roundedRect(rect.x, rect.y, rect.w, rect.h, 8);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#edf2f7";
      ctx.font = "700 13px system-ui, sans-serif";
      ctx.fillText(rect.name, rect.x + 12, rect.y + 22);
    }

    function drawCamera(rect, d) {
      drawPanel(rect);
      const cam = d.camera || {};
      const view = {
        x: rect.x + 10,
        y: rect.y + 34,
        w: Math.max(40, rect.w - 20),
        h: Math.max(40, rect.h - 58)
      };

      ctx.save();
      ctx.beginPath();
      roundedRect(view.x, view.y, view.w, view.h, 6);
      ctx.clip();
      ctx.fillStyle = "#06080b";
      ctx.fillRect(view.x, view.y, view.w, view.h);

      if (cameraReady && cameraImg.naturalWidth > 0 && cameraImg.naturalHeight > 0) {
        const scale = Math.min(view.w / cameraImg.naturalWidth, view.h / cameraImg.naturalHeight);
        const iw = cameraImg.naturalWidth * scale;
        const ih = cameraImg.naturalHeight * scale;
        const ix = view.x + (view.w - iw) / 2;
        const iy = view.y + (view.h - ih) / 2;
        ctx.drawImage(cameraImg, ix, iy, iw, ih);
      } else {
        ctx.fillStyle = "#aeb8c4";
        ctx.font = "13px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("Sin imagen de cámara", view.x + view.w / 2, view.y + view.h / 2);
        ctx.textAlign = "left";
        ctx.textBaseline = "alphabetic";
      }

      if (d.verde_detectado) {
        ctx.strokeStyle = "#39e66d";
        ctx.lineWidth = 6;
        ctx.strokeRect(view.x + 3, view.y + 3, view.w - 6, view.h - 6);
        ctx.fillStyle = "rgba(20, 110, 45, 0.88)";
        ctx.fillRect(view.x + 12, view.y + 12, Math.min(245, view.w - 24), 34);
        ctx.fillStyle = "#ffffff";
        ctx.font = "700 16px system-ui, sans-serif";
        ctx.fillText("META VERDE DETECTADA", view.x + 22, view.y + 35);
      }

      ctx.restore();

      ctx.fillStyle = cam.ok ? "#45c46a" : "#ff9f43";
      ctx.font = "12px ui-monospace, monospace";
      const meta = cam.ok
        ? `${cam.encoding || "imagen"} ${cam.w || 0}x${cam.h || 0}`
        : `esperando ${cam.topic || "/image_raw"}`;
      ctx.fillText(meta, rect.x + 12, rect.y + rect.h - 14);
    }

    function drawLidar(rect, d) {
      drawPanel(rect);
      const pad = 38;
      const cx = rect.x + rect.w / 2;
      const cy = rect.y + rect.h / 2 + 12;
      const radiusPx = Math.max(70, Math.min(rect.w - pad * 2, rect.h - pad * 2) / 2);
      const scale = radiusPx / lidarScale;

      ctx.save();
      ctx.beginPath();
      ctx.rect(rect.x + 8, rect.y + 32, rect.w - 16, rect.h - 40);
      ctx.clip();

      ctx.strokeStyle = "#2f3744";
      ctx.lineWidth = 1;
      ctx.font = "11px ui-monospace, monospace";
      ctx.fillStyle = "#7d8794";
      for (let r = 0.3; r <= 1.2; r += 0.3) {
        ctx.beginPath();
        ctx.arc(cx, cy, r * scale, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillText(`${r.toFixed(1)}m`, cx + r * scale + 4, cy - 4);
      }

      ctx.strokeStyle = "#3b4655";
      line(cx - radiusPx, cy, cx + radiusPx, cy);
      line(cx, cy - radiusPx, cx, cy + radiusPx);

      const pts = d.lidar || [];
      ctx.fillStyle = "#8fa3ad";
      for (const p of pts) {
        const x = cx - Number(p[1]) * scale;
        const y = cy - Number(p[0]) * scale;
        ctx.fillRect(x - 1.4, y - 1.4, 2.8, 2.8);
      }

      drawWallSegments(cx, cy, scale, d.wall_segments || []);

      drawLidarDistances(cx, cy, scale, d);
      drawRobotLidar(cx, cy, scale);

      ctx.restore();

      ctx.fillStyle = "#9aa6b2";
      ctx.font = "12px ui-monospace, monospace";
      const left = rect.x + 12;
      const bottom = rect.y + rect.h - 14;
      ctx.fillText(`pts ${(d.lidar || []).length}`, left, bottom - 16);
      ctx.fillText(`izq ${fmt(d.d_izq, "m")}  der ${fmt(d.d_der, "m")}`, left, bottom);
    }

    function drawWallSegments(cx, cy, scale, segments) {
      ctx.save();
      ctx.strokeStyle = "#00e5ff";
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      for (const seg of segments) {
        if (!Array.isArray(seg) || seg.length < 2) continue;
        ctx.beginPath();
        for (let i = 0; i < seg.length; i++) {
          const p = seg[i];
          const x = cx - Number(p[1]) * scale;
          const y = cy - Number(p[0]) * scale;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawLidarDistances(cx, cy, scale, d) {
      const measures = [
        { label: "F", text: "frente", value: Number(d.d_frente), ux: 0, uy: -1, color: "#00e5ff", tx: 10, ty: -12, align: "left" },
        { label: "I", text: "izq", value: Number(d.d_izq), ux: -1, uy: 0, color: "#4f83ff", tx: -10, ty: -12, align: "right" },
        { label: "D", text: "der", value: Number(d.d_der), ux: 1, uy: 0, color: "#4f83ff", tx: 10, ty: -12, align: "left" },
        { label: "A", text: "atras", value: Number(d.d_atras), ux: 0, uy: 1, color: "#a78bfa", tx: 10, ty: 14, align: "left" }
      ];

      ctx.save();
      ctx.font = "700 12px ui-monospace, monospace";
      ctx.textBaseline = "middle";

      for (const m of measures) {
        if (!Number.isFinite(m.value) || m.value <= 0) continue;
        const ex = cx + m.ux * m.value * scale;
        const ey = cy + m.uy * m.value * scale;
        ctx.strokeStyle = m.color;
        ctx.fillStyle = m.color;
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 4]);
        drawArrow(cx, cy, ex, ey, 9);
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.arc(ex, ey, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.textAlign = m.align;
        ctx.fillText(`${m.label} ${m.value.toFixed(2)}m`,
                     ex + m.tx, ey + m.ty);
      }

      ctx.restore();
    }

    function drawArrow(x1, y1, x2, y2, head) {
      line(x1, y1, x2, y2);
      const ang = Math.atan2(y2 - y1, x2 - x1);
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - head * Math.cos(ang - Math.PI / 6),
                 y2 - head * Math.sin(ang - Math.PI / 6));
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - head * Math.cos(ang + Math.PI / 6),
                 y2 - head * Math.sin(ang + Math.PI / 6));
      ctx.stroke();
    }

    function drawRobotLidar(cx, cy, scale) {
      const front = 0.15 * scale;
      const back = 0.10 * scale;
      const side = 0.08 * scale;
      ctx.strokeStyle = "#f7fafc";
      ctx.lineWidth = 1.6;
      ctx.strokeRect(cx - side, cy - front, side * 2, front + back);
      ctx.beginPath();
      ctx.moveTo(cx, cy - front);
      ctx.lineTo(cx - 0.04 * scale, cy - front + 0.04 * scale);
      ctx.moveTo(cx, cy - front);
      ctx.lineTo(cx + 0.04 * scale, cy - front + 0.04 * scale);
      ctx.stroke();
      ctx.fillStyle = "#f7fafc";
      ctx.beginPath();
      ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawTrack(rect, d) {
      drawPanel(rect);
      const header = 36;
      const labelPadL = 28;
      const labelPadT = 18;
      const pad = 18;
      const availW = rect.w - pad * 2 - labelPadL;
      const availH = rect.h - header - pad * 2 - labelPadT;
      const s = Math.max(18, Math.min(availW / PISTA_COLS, availH / PISTA_ROWS));
      const ox = rect.x + pad + labelPadL + Math.max(0, (availW - PISTA_COLS * s) / 2);
      const oy = rect.y + header + pad + labelPadT + Math.max(0, (availH - PISTA_ROWS * s) / 2);

      function tx(x) { return ox + x * s; }
      function ty(y) { return oy + y * s; }

      ctx.save();
      ctx.beginPath();
      ctx.rect(rect.x + 8, rect.y + 32, rect.w - 16, rect.h - 40);
      ctx.clip();

      for (const [c, r] of CAMINO_RAPIDO) {
        ctx.fillStyle = "#353b49";
        ctx.fillRect(tx(c), ty(r - 1), s, s);
      }

      // Progreso sobre la ruta fija (no sobre la trayectoria de odometria):
      // se usa `giros_fisicos` (cuenta cada giro de 90 REAL, publicado por
      // maze_solver en /maze/metricas), NO `tramo` (contado aca antes via
      // /maze/estado): tramo solo sube al volver a AVANZAR_PARALELO, pero
      // un "giro vacio" puede encadenar VARIOS giros de 90 seguidos sin
      // volver a AVANZAR_PARALELO entre medio (ver AVANCE_GIRO_VACIO en
      // maze_solver.py) -- con tramo esos giros intermedios se perdian
      // (ej. B2->B3, dos giros IZQUIERDA seguidos a 1 celda de distancia).
      // giros_fisicos cuenta cada uno por separado, sin recalcular nada,
      // solo escuchando la señal.
      // logica_dos_reglas (modo activo) no se detiene en la meta: el verde
      // solo marca la celda, sigue la pared izquierda hasta cerrar la
      // vuelta completa. Por eso el progreso es directo desde el contador,
      // sin casos especiales para META.
      const metaVista = !!(d.verde_pos && d.verde_pos.length > 0);

      // MODO RUTA FIJA (fase 2: ESPERA_RUTA/SEGUIR_RUTA/META con la ruta
      // amarilla cargada): giros_fisicos sigue sumando con los giros del
      // guion fijo e indexaria vertices de RUTA_EXPLORACION (el camino de
      // MAPEO, fase 1) que ya no tienen nada que ver con donde esta el
      // carrito -- por eso el icono aparecia lejos de la linea amarilla.
      // En este modo se usa d.pos/d.head (posicion/rumbo REALES, ya en
      // coords de pista) en vez de la punta hardcodeada de fase 1.
      const modoRutaFija = (
        (d.estado === "SEGUIR_RUTA" || d.estado === "META" || d.estado === "ESPERA_RUTA") &&
        Array.isArray(d.ruta_corta) && d.ruta_corta.length > 1
      );

      let verticesListos, celdasListas, puntaX, puntaY, rumboX, rumboY;
      if (modoRutaFija && d.pos) {
        verticesListos = -1;
        celdasListas = 0;
        puntaX = d.pos[0];
        puntaY = d.pos[1];
        const head = d.head || [0, -1];
        rumboX = head[0];
        rumboY = head[1];
      } else {
        const tramoActual = Math.max(0, Number(d.giros_fisicos) || 0);
        verticesListos = Math.min(tramoActual, RUTA_EXPLORACION.length - 1);
        celdasListas = RUTA_EXPLORACION_TRAMO_FIN[verticesListos] + 1;

        // Punta = ultimo vertice YA confirmado por giros_fisicos. SIN
        // proyeccion de d.pos, a proposito: cualquier ruido/deriva de
        // odometria dentro del tramo en curso ya no mueve la punta ni la
        // linea -- se queda quieta en el ultimo vertice hasta que llegue el
        // siguiente giro real, y entonces salta (sin animacion) al proximo
        // vertice. 100% hardcodeado, cero calculo en vivo sobre la forma.
        const vA = RUTA_EXPLORACION[verticesListos];
        const vB = RUTA_EXPLORACION[verticesListos + 1] || vA;
        puntaX = vA[0] + 0.5;
        puntaY = vA[1] + 0.5;
        rumboX = vB[0] - vA[0];
        rumboY = vB[1] - vA[1];
        if (rumboX === 0 && rumboY === 0) {
          const vPrev = RUTA_EXPLORACION[Math.max(0, verticesListos - 1)];
          rumboX = vA[0] - vPrev[0];
          rumboY = vA[1] - vPrev[1];
        }
      }

      ctx.fillStyle = "rgba(79, 131, 255, 0.26)";
      for (let i = 0; i < celdasListas; i++) {
        const [c, r] = RUTA_EXPLORACION_CELDAS[i];
        if (c === 0 && r === 6) continue;
        ctx.fillRect(tx(c), ty(r), s, s);
      }

      ctx.strokeStyle = "#2f3744";
      ctx.lineWidth = 1;
      for (let c = 0; c <= PISTA_COLS; c++) line(tx(c), ty(0), tx(c), ty(PISTA_ROWS));
      for (let r = 0; r <= PISTA_ROWS; r++) line(tx(0), ty(r), tx(PISTA_COLS), ty(r));

      ctx.fillStyle = "#aeb8c4";
      ctx.font = "11px ui-monospace, monospace";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      for (let c = 0; c < PISTA_COLS; c++) ctx.fillText(String.fromCharCode(65 + c), tx(c + 0.5), oy - 11);
      ctx.textAlign = "right";
      for (let r = 0; r < PISTA_ROWS; r++) ctx.fillText(String(r + 1), ox - 9, ty(r + 0.5));
      ctx.textAlign = "left";
      ctx.textBaseline = "alphabetic";

      ctx.strokeStyle = "#26c6da";
      ctx.lineWidth = Math.max(2.4, s * 0.06);
      ctx.lineCap = "round";
      for (const wall of PISTA_BORDES.concat(PISTA_PAREDES)) {
        line(tx(wall[0]), ty(wall[1]), tx(wall[2]), ty(wall[3]));
      }
      ctx.lineCap = "butt";

      drawStartGoal(tx, ty, s, metaVista);

      // Al detenerse en el INICIO tras la vuelta, resaltar el punto de inicio
      // (celda A7) para indicar que espera el comando de ruta.
      if (d.estado === "ESPERA_RUTA") {
        ctx.save();
        ctx.strokeStyle = "#ffd54f";
        ctx.lineWidth = Math.max(3, s * 0.1);
        ctx.shadowColor = "rgba(255, 213, 79, 0.85)";
        ctx.shadowBlur = Math.max(6, s * 0.32);
        ctx.strokeRect(tx(0) + 2, ty(6) + 2, s - 4, s - 4);
        ctx.restore();
      }

      // Recorrido dibujado (cyan) = ruta de EXPLORACION (fase 1) revelada
      // por `giros_fisicos`. En modo ruta fija (fase 2) se omite: ya no
      // representa nada (giros_fisicos sigue subiendo con los giros del
      // guion fijo) y la linea amarilla + la posicion real (d.pos) alcanzan.
      if (!modoRutaFija) {
        ctx.strokeStyle = "#00e5ff";
        ctx.lineWidth = Math.max(2, s * 0.045);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.beginPath();
        const [c0, r0] = RUTA_EXPLORACION[0];
        ctx.moveTo(tx(c0 + 0.5), ty(r0 + 0.5));
        for (let i = 1; i <= verticesListos; i++) {
          const [c, r] = RUTA_EXPLORACION[i];
          ctx.lineTo(tx(c + 0.5), ty(r + 0.5));
        }
        ctx.lineTo(tx(puntaX), ty(puntaY));
        ctx.stroke();
        ctx.lineCap = "butt";
      }

      // Ruta más corta (fase 2): polilínea AMARILLA sobre el recorrido cyan.
      const ruta = d.ruta_corta || [];
      if (ruta.length > 1) {
        ctx.save();
        ctx.strokeStyle = "#ffd54f";
        ctx.lineWidth = Math.max(3, s * 0.09);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.shadowColor = "rgba(255, 213, 79, 0.65)";
        ctx.shadowBlur = Math.max(4, s * 0.18);
        ctx.beginPath();
        ctx.moveTo(tx(Number(ruta[0][0])), ty(Number(ruta[0][1])));
        for (let i = 1; i < ruta.length; i++) {
          ctx.lineTo(tx(Number(ruta[i][0])), ty(Number(ruta[i][1])));
        }
        ctx.stroke();
        // Puntos en cada celda de la ruta, para que se lea bien.
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#ffd54f";
        for (const p of ruta) {
          ctx.beginPath();
          ctx.arc(tx(Number(p[0])), ty(Number(p[1])), Math.max(2, s * 0.05), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      // El carrito se dibuja en (puntaX,puntaY): en modo exploracion es la
      // punta del recorrido cyan (fase 1, sin usar d.pos crudo); en modo
      // ruta fija (fase 2) es d.pos/d.head real (ver modoRutaFija arriba).
      {
        const px = tx(puntaX);
        const py = ty(puntaY);
        drawRobotTrack(px, py, rumboX, rumboY, s);

        ctx.fillStyle = "#ffd54f";
        ctx.font = "700 13px system-ui, sans-serif";
        ctx.fillText(`G${d.giros_fisicos || 0}`, px + 10, py - 10);
      }

      // PARE (rojo) se dibuja al final a proposito: siempre debe verse
      // encima de la linea de recorrido y del robot, nunca tapado por
      // ellos -- y anclado a la celda de la ruta mas cercana, para quedar
      // siempre SOBRE la linea en vez de al costado por deriva de odometria.
      for (const p of d.pare || []) {
        const [sx, sy] = celdaMasCercanaEnRuta(Number(p[0]), Number(p[1]));
        const x = tx(sx);
        const y = ty(sy);
        const radio = Math.max(7, s * 0.15);
        ctx.fillStyle = "#ff1744";
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, radio, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#ffffff";
        ctx.font = `700 ${Math.max(9, radio)}px system-ui, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("P", x, y + 0.5);
        ctx.textAlign = "left";
        ctx.textBaseline = "alphabetic";
      }

      ctx.restore();

      ctx.fillStyle = "#9aa6b2";
      ctx.font = "12px ui-monospace, monospace";
      const n = d.n_pts ?? (d.traj || []).length;
      ctx.fillText(`tray ${n} pts   pare ${(d.pare || []).length}`, rect.x + 12, rect.y + rect.h - 14);
    }

    function drawRobotTrack(cx, cy, hx, hy, s) {
      let mag = Math.hypot(hx, hy);
      if (!Number.isFinite(mag) || mag < 0.001) {
        hx = 0;
        hy = -1;
        mag = 1;
      }
      const angle = Math.atan2(hy, hx);
      const largo = Math.max(18, s * 0.62);
      const ancho = Math.max(11, s * 0.4);
      const ruedaL = largo * 0.3;
      const ruedaA = Math.max(2.5, ancho * 0.18);

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);

      // sombra de contacto, da sensacion de que esta "sobre" la pista
      ctx.fillStyle = "rgba(0, 0, 0, 0.32)";
      ctx.beginPath();
      roundedRect(-largo / 2 + 2, -ancho / 2 + 2.5, largo, ancho, ancho * 0.35);
      ctx.fill();

      // 2 pares de ruedas
      ctx.fillStyle = "#171b22";
      for (const ex of [-largo * 0.26, largo * 0.2]) {
        ctx.fillRect(ex - ruedaL / 2, -ancho / 2 - ruedaA * 0.5, ruedaL, ruedaA);
        ctx.fillRect(ex - ruedaL / 2, ancho / 2 - ruedaA * 0.5, ruedaL, ruedaA);
      }

      // carroceria (degradado sutil + borde cyan que es la marca del carrito)
      const grad = ctx.createLinearGradient(-largo / 2, 0, largo / 2, 0);
      grad.addColorStop(0, "#aeb8c4");
      grad.addColorStop(1, "#f7fafc");
      ctx.fillStyle = grad;
      ctx.strokeStyle = "#00e5ff";
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      roundedRect(-largo / 2, -ancho / 2, largo, ancho, ancho * 0.42);
      ctx.fill();
      ctx.stroke();

      // cabina hacia el frente, marca claramente hacia donde avanza
      ctx.fillStyle = "rgba(15, 23, 33, 0.55)";
      ctx.beginPath();
      roundedRect(largo * 0.04, -ancho * 0.32, largo * 0.32, ancho * 0.64, ancho * 0.2);
      ctx.fill();

      // faro delantero
      ctx.fillStyle = "#fff59d";
      ctx.beginPath();
      ctx.arc(largo / 2 - 1.5, 0, Math.max(1.8, ancho * 0.14), 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawStartGoal(tx, ty, s, metaVista) {
      ctx.fillStyle = "#45c46a";
      ctx.strokeStyle = "#9cffb7";
      ctx.lineWidth = 1.5;
      ctx.fillRect(tx(0), ty(6.5), s * 0.5, s * 0.5);
      ctx.strokeRect(tx(0), ty(6.5), s * 0.5, s * 0.5);
      ctx.fillStyle = "#ffffff";
      ctx.font = `700 ${Math.max(10, s * 0.2)}px system-ui, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("I", tx(0.25), ty(6.75));

      // M arranca ROJA (meta no vista todavia) y se pinta de VERDE apenas
      // la camara confirma el cartel (d.verde_pos) -- un solo marcador, sin
      // un segundo icono aparte para "meta vista".
      if (metaVista) {
        ctx.fillStyle = "#45c46a";
        ctx.strokeStyle = "#9cffb7";
        if (s * 0.32 > 0) {
          ctx.shadowColor = "rgba(69, 196, 106, 0.85)";
          ctx.shadowBlur = Math.max(6, s * 0.32);
        }
      } else {
        ctx.fillStyle = "#ef5350";
        ctx.strokeStyle = "#ff9f9f";
      }
      ctx.fillRect(tx(11.5), ty(0), s * 0.5, s * 0.5);
      ctx.strokeRect(tx(11.5), ty(0), s * 0.5, s * 0.5);
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#ffffff";
      ctx.fillText("M", tx(11.75), ty(0.25));
      ctx.textAlign = "left";
      ctx.textBaseline = "alphabetic";
    }

    function line(x1, y1, x2, y2) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    function roundedRect(x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.moveTo(x + rr, y);
      ctx.lineTo(x + w - rr, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
      ctx.lineTo(x + w, y + h - rr);
      ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
      ctx.lineTo(x + rr, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
      ctx.lineTo(x, y + rr);
      ctx.quadraticCurveTo(x, y, x + rr, y);
      ctx.closePath();
    }

    function drawEmptyOverlay() {
      if (data) return;
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      ctx.fillStyle = "#aeb8c4";
      ctx.font = "14px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Esperando datos del carrito", w / 2, h / 2 - 10);
      ctx.fillStyle = "#7d8794";
      ctx.font = "12px ui-monospace, monospace";
      ctx.fillText(endpoint, w / 2, h / 2 + 14);
      ctx.textAlign = "left";
    }

    function render() {
      resizeCanvas();
      clear();
      const panels = panelLayout();
      const d = data || { lidar: [], traj: [], pare: [], estado: "INICIO", tramo: 0, odom_cm: 0 };
      drawCamera(panels[0], d);
      drawLidar(panels[1], d);
      drawTrack(panels[2], d);
      drawEmptyOverlay();

      if (lastError && performance.now() - lastOkAt > 1200) {
        toast.textContent = `${lastError}. Revisa la IP, el puerto 8080 y que visualizador_web este corriendo.`;
        toast.classList.add("show");
      } else if (!lastError) {
        toast.classList.remove("show");
      }
      requestAnimationFrame(render);
    }

    function restartPolling() {
      endpoint = normalizeEndpoint(endpointInput.value);
      endpointInput.value = endpoint;
      localStorage.setItem("capytown.endpoint", endpoint);
      window.clearInterval(timer);
      poll();
      timer = window.setInterval(poll, Number($("rate").value));
    }

    $("connect").addEventListener("click", () => {
      data = null;
      lastError = "";
      restartPolling();
    });

    $("pause").addEventListener("click", () => {
      paused = !paused;
      $("pause").textContent = paused ? "Reanudar" : "Pausar";
      setStatus(paused ? "bad" : "ok", paused ? "Pausado" : "Conectado");
      if (!paused) poll();
    });

    $("rate").addEventListener("change", restartPolling);

    $("fit").addEventListener("click", () => {
      centerFollow = !centerFollow;
      lidarScale = centerFollow ? 1.35 : 2.4;
      $("fit").textContent = centerFollow ? "Centrar" : "Amplio";
    });

    endpointInput.addEventListener("keydown", (ev) => {
      if (ev.key === "Enter") restartPolling();
    });

    window.addEventListener("resize", resizeCanvas);
    restartPolling();
    render();
  </script>
</body>
</html>
